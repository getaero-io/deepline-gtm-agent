[build]
builder = "DOCKERFILE"
dockerfilePath = "managed_agent/Dockerfile"

[deploy]
startCommand = "sh -c 'mkdir -p ~/.local/deepline/code-deepline-com && printf \"DEEPLINE_API_KEY=%s\\nDEEPLINE_CLAIM_TOKEN=%s\\n\" \"$DEEPLINE_API_KEY\" \"${DEEPLINE_CLAIM_TOKEN:-}\" > ~/.local/deepline/code-deepline-com/.env && python server.py'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
