<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deepline GTM Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e5e5e5;height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid #222;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:600;color:#fff}
header span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:4px}
#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:720px;line-height:1.6;white-space:pre-wrap;font-size:14px}
.msg.user{align-self:flex-end;background:#1a3a5c;padding:12px 16px;border-radius:12px 12px 4px 12px}
.msg.agent{align-self:flex-start;background:#1a1a1a;padding:12px 16px;border-radius:12px 12px 12px 4px}
.msg.tool{font-size:12px;color:#888;font-family:monospace;padding:4px 12px;border-left:2px solid #333}
.msg.status{font-size:12px;color:#555;text-align:center;align-self:center}
#input-area{padding:16px 24px;border-top:1px solid #222;display:flex;gap:12px}
#input-area textarea{flex:1;background:#1a1a1a;border:1px solid #333;color:#e5e5e5;padding:12px;border-radius:8px;font-size:14px;font-family:inherit;resize:none;height:48px}
#input-area textarea:focus{outline:none;border-color:#4a90d9}
#input-area button{background:#4a90d9;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}
#input-area button:hover{background:#5aa0e9}
#input-area button:disabled{background:#333;color:#666;cursor:not-allowed}
.templates{padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap}
.templates button{background:#1a1a1a;border:1px solid #333;color:#999;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.templates button:hover{border-color:#4a90d9;color:#e5e5e5}
</style>
</head>
<body>
<header>
  <h1>Deepline GTM Agent</h1>
  <span>Managed Agent</span>
</header>
<div class="templates">
  <button onclick="fill('Find 10 Series B fintech companies hiring for GTM engineers')">Prospecting</button>
  <button onclick="fill('Find work emails for the contacts in leads.csv using a waterfall')">Email waterfall</button>
  <button onclick="fill('What tools are available for email validation?')">Tool discovery</button>
  <button onclick="fill('Check my billing balance and credit usage')">Billing</button>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="prompt" placeholder="Ask the GTM agent anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send-btn" onclick="send()">Send</button>
</div>
<script>
const messages=document.getElementById('messages'),input=document.getElementById('prompt'),btn=document.getElementById('send-btn');
function addMsg(text,cls){const d=document.createElement('div');d.className='msg '+cls;d.textContent=text;messages.appendChild(d);messages.scrollTop=messages.scrollHeight;return d}
function fill(t){input.value=t;input.focus()}
async function send(){
  const text=input.value.trim();if(!text)return;
  input.value='';btn.disabled=true;
  addMsg(text,'user');
  const agentEl=addMsg('','agent');
  addMsg('Starting session...','status');
  try{
    const res=await fetch('/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const raw=line.slice(6);if(raw==='[DONE]')continue;
        try{
          const evt=JSON.parse(raw);
          if(evt.type==='text')agentEl.textContent+=evt.text;
          else if(evt.type==='tool')addMsg('$ '+(evt.command||evt.name).slice(0,200),'tool');
          else if(evt.session_id)messages.querySelector('.status').textContent='Session: '+evt.session_id;
        }catch{}
      }
    }
  }catch(e){addMsg('Error: '+e.message,'status')}
  btn.disabled=false;input.focus();
}
</script>
</body>
</html>
