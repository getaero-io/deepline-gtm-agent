# GTM Agent Evals
#
# Tests the deployed agent's ability to route requests to the right tools.
# Each eval sends a prompt to the agent (via HTTP or direct Python invoke)
# and asserts on:
#   - tools_called: which Deepline/GTM tools the agent invoked
#   - response_contains: keywords/phrases that must appear in the reply
#   - tools_not_called: tools that should NOT have been called (wrong routing)
#   - expect_response_not_contains: phrases that must NOT appear (catches soft failures)
#   - expect_response_matches_regex: regex patterns for structured data validation
#
# Tags:
#   core             — must-pass for any deploy
#   crm              — HubSpot, Salesforce, Attio
#   enrichment       — person/company data enrichment
#   outreach         — Instantly, Lemlist, Smartlead, HeyReach
#   research         — Exa, Firecrawl, web research
#   prospecting      — people/company search

evals:

  # ---------------------------------------------------------------------------
  # Core routing — basic tool selection
  # ---------------------------------------------------------------------------

  - id: enrich-person-by-linkedin
    tags: [core, enrichment]
    prompt: >
      Enrich this person: linkedin.com/in/reidhoffman — get their current
      title, company, and work email.
    expect_response_contains:
      - linkedin
    expect_response_contains_any:
      - email
      - Reid
      - Hoffman
      - LinkedIn
      - enrichment
      - found
      - could not
    expect_response_not_contains:
      - no results
      - could not enrich
      - failed to

  - id: enrich-person-by-name-domain
    tags: [core, enrichment]
    prompt: >
      Find the work email for Satya Nadella at microsoft.com
    expect_tools_called_any:
      - enrich_person
      - waterfall_enrich
      - deepline_call
    expect_response_contains:
      - email
      - microsoft
      - "@"
    expect_response_not_contains:
      - no results
      - could not find

  - id: search-prospects
    tags: [core, prospecting]
    prompt: >
      Find 5 VP of Sales contacts at US SaaS companies with 100-500 employees.
      I need their name, title, company, and LinkedIn URL.
    expect_response_contains_any:
      - VP
      - Sales
      - contact
      - prospect
      - found
      - criteria
      - search
    expect_response_not_contains:
      - no results
      - no contacts
      - could not find

  - id: research-company
    tags: [core, research]
    prompt: >
      Research stripe.com — tell me their headcount, funding, and what they do.
    expect_tools_called:
      - research_company
    expect_response_contains:
      - stripe
    expect_response_contains_any:
      - employee
      - headcount
      - team
      - staff
      - people
      - billion
      - million
    expect_response_not_contains:
      - no results
      - could not find
      - no data found

  - id: verify-email
    tags: [core, enrichment]
    prompt: >
      Verify if the email john.smith@stripe.com is valid and safe to send to.
    expect_tools_called:
      - verify_email
    expect_response_contains_any:
      - valid
      - invalid
      - deliverable
      - status

  - id: find-linkedin
    tags: [core, enrichment]
    prompt: >
      Find the LinkedIn URL for Jensen Huang at NVIDIA.
    expect_tools_called:
      - find_linkedin
    expect_response_contains:
      - linkedin

  - id: search-companies
    tags: [core, prospecting]
    prompt: >
      Build a list of 10 Series B fintech companies in the US with 50-200 employees.
    expect_tools_called:
      - search_companies
    expect_response_contains:
      - fintech

  - id: web-research
    tags: [core, research]
    prompt: >
      What are the latest funding rounds in the AI infrastructure space this quarter?
    expect_response_contains_any:
      - funding
      - million
      - raised
      - AI
      - infrastructure
      - company

  # ---------------------------------------------------------------------------
  # HubSpot CRM operations
  # ---------------------------------------------------------------------------

  - id: hubspot-create-contact
    tags: [crm, core]
    prompt: >
      Create a new contact in HubSpot for John Smith, email john.smith@acme.com,
      title VP of Engineering at Acme Corp.
    expect_response_contains_any:
      - HubSpot
      - contact
      - connect
      - dashboard
      - credential
      - created
      - John Smith
      - validation error
      - error
      - issue
    # Agent routes to hubspot_create_contact. Valid outcomes: success, "connect your account",
    # or a payload schema error message. All are acceptable — we just want some meaningful response.

  - id: hubspot-search-contact
    tags: [crm]
    prompt: >
      Search HubSpot for a contact with email john.smith@acme.com
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - hubspot_search_objects
    expect_response_contains_any:
      - contact
      - found
      - result

  - id: hubspot-create-deal
    tags: [crm]
    prompt: >
      Create a HubSpot deal called "Acme Corp - Enterprise" for $50,000.
      Set it to the "Proposal Sent" stage.
    expect_response_contains_any:
      - HubSpot
      - deal
      - Acme
      - created
      - connect
      - credential

  - id: hubspot-create-company
    tags: [crm]
    prompt: >
      Add a new company to HubSpot: Acme Corp, industry Software, website acme.com
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - hubspot_create_company
    expect_response_contains_any:
      - company
      - created
      - Acme

  # ---------------------------------------------------------------------------
  # Salesforce operations
  # ---------------------------------------------------------------------------

  - id: salesforce-create-lead
    tags: [crm]
    prompt: >
      Create a Salesforce lead for Jane Doe, email jane.doe@techco.com,
      company TechCo, title CTO.
    expect_response_contains_any:
      - Salesforce
      - lead
      - Jane
      - created
      - connect
      - credential

  - id: salesforce-create-opportunity
    tags: [crm]
    prompt: >
      Create a Salesforce opportunity called "TechCo Enterprise Deal" worth
      $120,000, closing 2026-06-30, stage Negotiation.
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - salesforce_create_opportunity
    expect_response_contains_any:
      - opportunity
      - created

  # ---------------------------------------------------------------------------
  # Outreach tools
  # ---------------------------------------------------------------------------

  - id: instantly-list-campaigns
    tags: [outreach]
    prompt: >
      Show me all my Instantly campaigns and their current status.
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - instantly_list_campaigns
    expect_response_contains_any:
      - campaign
      - Instantly

  - id: lemlist-list-campaigns
    tags: [outreach]
    prompt: >
      List all my Lemlist campaigns.
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - lemlist_list_campaigns
    expect_response_contains_any:
      - campaign
      - Lemlist

  - id: heyreach-list-campaigns
    tags: [outreach]
    prompt: >
      What LinkedIn campaigns do I have in HeyReach?
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called:
      - heyreach_list_campaigns
    expect_response_contains_any:
      - campaign
      - LinkedIn
      - HeyReach

  # ---------------------------------------------------------------------------
  # Multi-step workflows
  # ---------------------------------------------------------------------------

  - id: find-and-verify-email
    tags: [core, enrichment]
    prompt: >
      Find the work email for Elon Musk at x.com, then verify it's valid.
    expect_tools_called:
      - verify_email
    expect_response_contains_any:
      - email
      - valid
      - invalid
      - status

  - id: company-research-then-find-contacts
    tags: [core, prospecting, research]
    prompt: >
      Research Anthropic — what do they do and how big are they?
      Then find 3 VP-level contacts there.
    expect_tools_called:
      - research_company
      - search_prospects
    expect_response_contains:
      - Anthropic
    expect_response_not_contains:
      - no results
      - could not find

  - id: waterfall-enrich-contact
    tags: [core, enrichment]
    prompt: >
      Use waterfall enrichment to get the work email for Sarah Connor at
      cyberdyne.com. Try multiple providers.
    expect_tools_called:
      - waterfall_enrich
    expect_response_contains_any:
      - email
      - enrichment
      - provider
      - tried
      - waterfall
      - dropleads
      - hunter
    # cyberdyne.com is fictional — no email will be found. We just verify the agent
    # tries the waterfall and explains what it did, not that it finds an email.

  # ---------------------------------------------------------------------------
  # Research tools — Exa, Firecrawl, Apify
  # ---------------------------------------------------------------------------

  - id: exa-research
    tags: [research]
    prompt: >
      What is OpenAI's latest product launch and what are analysts saying about it?
    expect_tools_called_any:
      - web_research
      - deepline_call
    expect_response_contains_any:
      - OpenAI
      - launch
      - product

  - id: firecrawl-scrape
    tags: [research]
    prompt: >
      Scrape the homepage of deepline.com and summarize what the company does.
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called_any:
      - firecrawl_scrape
      - exa_research
      - exa_search
    expect_response_contains:
      - Deepline

  # ---------------------------------------------------------------------------
  # Enrichment providers — Apollo, Crustdata, Hunter, PDL
  # ---------------------------------------------------------------------------

  - id: apollo-people-search
    tags: [enrichment, prospecting]
    prompt: >
      Use Apollo to find 5 Director-level contacts in the cybersecurity space.
    expect_tools_called:
      - deepline_call
    expect_tool_ids_called_any:
      - apollo_search_people
      - apollo_people_search_paid
    expect_response_contains_any:
      - Director
      - contact
      - Apollo

  - id: hunter-email-finder
    tags: [enrichment]
    prompt: >
      Use Hunter to find all email addresses at notion.so
    expect_tools_called_any:
      - deepline_call
      - enrich_person
    expect_response_contains_any:
      - notion
      - email
      - Hunter

  - id: crustdata-company
    tags: [enrichment, research]
    prompt: >
      Use Crustdata to get company details for figma.com
    expect_tools_called_any:
      - research_company
      - deepline_call
    expect_response_contains_any:
      - Figma
      - employee
      - company

  # ---------------------------------------------------------------------------
  # Edge cases and error handling
  # ---------------------------------------------------------------------------

  - id: missing-tool-graceful-fallback
    tags: [core]
    prompt: >
      Find phone numbers for the CEO of apple.com
    expect_response_contains_any:
      - phone
      - number
      - CEO
      - Apple
      - unable
      - found

  - id: general-gtm-question
    tags: [core]
    prompt: >
      What enrichment providers work best for finding mobile phone numbers?
    expect_response_contains_any:
      - phone
      - provider
      - enrichment
      - LeadMagic
      - Dropleads
      - mobile

  # ---------------------------------------------------------------------------
  # New evals — real-world failing scenarios
  # ---------------------------------------------------------------------------

  - id: search-niche-title
    tags: [core, prospecting]
    prompt: >
      Find 5 GTM engineers at US SaaS startups.
    expect_response_contains_any:
      - Growth Engineer
      - GTM Engineer
      - Revenue Operations
      - Marketing Engineer
      - engineer
    expect_response_not_contains:
      - no results
      - could not find
      - no contacts found

  - id: search-recently-hired
    tags: [core, prospecting]
    prompt: >
      Find 5 GTM engineers that were hired in NYC in the last 3 months.
      I need their name, title, company, and LinkedIn URL.
    expect_response_contains_any:
      - Engineer
      - GTM
      - Growth
      - New York
      - NYC
      - linkedin
      - contact
      - found
    expect_response_not_contains:
      - no results
      - could not find
      - no contacts found
      - 0 results

  - id: phone-lookup
    tags: [core, enrichment]
    prompt: >
      Find the phone number for Reid Hoffman. He's at Greylock Partners.
    expect_response_contains_any:
      - phone
      - number
      - mobile
      - Forager
      - not found
      - coverage
      - unable
    # Phone coverage is ~30-40% so "not found" is a valid honest response

  - id: search-with-location
    tags: [core, prospecting]
    prompt: >
      Find 5 VP of Sales in New York City at fintech companies.
    expect_response_contains_any:
      - VP
      - Sales
      - New York
      - NYC
      - fintech
      - contact
      - found
    expect_response_not_contains:
      - no results
      - could not find
      - no contacts

  - id: enrich-then-verify
    tags: [core, enrichment]
    prompt: >
      Find and verify the work email for Satya Nadella at Microsoft.
      I need to know if it's safe to send to.
    expect_response_contains:
      - microsoft
    expect_response_contains_any:
      - valid
      - invalid
      - verified
      - catch_all
      - safe to send
      - deliverable
    expect_response_not_contains:
      - no results
      - could not find

  - id: waterfall-email-with-linkedin
    tags: [core, enrichment]
    prompt: >
      I have a LinkedIn URL for someone: linkedin.com/in/andrewyng
      Can you find their work email?
    expect_response_contains_any:
      - email
      - stanford
      - Andrew
      - Ng
      - linkedin
      - found
      - not found
      - enrichment
